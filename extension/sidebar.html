<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Chatbot</title>
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <div id="app">
    <div id="header">
      <span>🎬 YouTube Chatbot</span>
      <button id="clear-btn" title="Clear chat">🗑</button>
    </div>

    <div id="status-bar">No video loaded</div>

    <div id="chat-box"></div>

    <div id="input-area">
      <input id="user-input" type="text" placeholder="Ask about this video..." />
      <button id="send-btn">Send</button>
    </div>
  </div>
  <script src="sidebar.js"></script>
</body>
</html>
